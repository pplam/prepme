<!DOCTYPE html>
<!--
  prepme saved-answer template. The check-in action replaces these placeholders:
    __TITLE__       -> page <title> string (e.g. "Answer — <short question>")
    __SHEET__       -> relative path back to the study sheet (e.g. "../interview-prep.html")
    __BACK__        -> "Back to study sheet" link label, in the sheet's language
    __QUESTION__    -> the full question text (HTML-escaped)
    __LEVEL__       -> the question's level: Foundational | Core | Advanced (controls the pill colour)
    __LEVEL_LABEL__ -> the level label in the sheet's language (text shown in the pill)
    __META__        -> small chips HTML for the root card, e.g.
                       <span class="chip"><b>Why:</b> CV: owned the billing rewrite</span><span class="chip">2026-06-07</span>
    __ANSWER__      -> the main answer as HTML. Use <h2> for sections (translate to the sheet's
                       language): Best answer, Bonus points, Discussion (the candidate's
                       intermediate questions + how each resolved). Wrap ASCII diagrams in <pre>.
    __FU_LABEL__    -> heading for the follow-ups block (e.g. "Follow-ups & how to handle them")
    __FOLLOWUPS__   -> one tree node per follow-up, each in this exact shape:
                       <div class="node"><div class="card fu">
                         <div class="q-row"><span class="node-dot"></span><span class="q-text">FOLLOW-UP QUESTION</span></div>
                         <div class="answer">...how to answer it (HTML: <p>, <ul>, <pre>, ...)...</div>
                       </div></div>
  Keep this file self-contained (inline CSS, no network) and in the sheet's language.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
  :root{
    --bg:#f7f8fa; --panel:#ffffff; --panel2:#f0f2f5; --line:#e3e6ec; --line2:#eef0f4;
    --txt:#1f2430; --muted:#6b7280; --soft:#8a91a0; --accent:#3b6cf6; --accent-weak:#e8efff;
    --good:#16a34a; --good-weak:#e7f6ec;
    --found:#16a34a; --core:#c2860a; --adv:#dc2626;
    --tree:#d4d9e2; --code:#f4f6fa;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    font:15px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Inter","Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--txt);
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:840px;margin:0 auto;padding:30px 22px 96px}

  .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-bottom:20px}
  .back:hover{color:var(--accent)}

  /* tree (mirrors the study sheet) */
  .tree{position:relative;margin-left:6px}
  .node{position:relative;padding-left:26px}
  .node::before{content:"";position:absolute;left:0;top:0;bottom:0;width:1.5px;background:var(--tree)}
  .node:last-child::before{bottom:auto;height:24px}
  .node::after{content:"";position:absolute;left:0;top:23px;width:18px;height:1.5px;background:var(--tree)}

  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:15px 17px;margin:9px 0;box-shadow:var(--shadow)}

  .q-row{display:flex;gap:9px;align-items:flex-start}
  .node-dot{flex:none;width:9px;height:9px;border-radius:50%;margin-top:7px;background:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  .q-text{font-weight:700;flex:1;letter-spacing:-.005em}
  .lvl{flex:none;font-size:10.5px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-top:2px}
  .lvl.Foundational{color:var(--found);border-color:#bfe6c9;background:var(--good-weak)}
  .lvl.Core{color:var(--core);border-color:#f0dcae;background:#fbf3e0}
  .lvl.Advanced{color:var(--adv);border-color:#f3c2c2;background:#fdeaea}

  /* root question card — a touch more prominent */
  .card.root{border-left:3px solid var(--accent);padding:18px 20px}
  .card.root .q-text{font-size:18px;line-height:1.45}
  .card.root .qlabel{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:9px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:12px;color:var(--muted)}
  .chip b{color:var(--txt);font-weight:600}

  /* section heading between blocks */
  .sec{display:flex;align-items:baseline;gap:10px;margin:34px 0 8px}
  .sec .sec-name{font-size:13px;color:var(--soft);text-transform:uppercase;letter-spacing:.07em;font-weight:700}

  /* article typography for answers (main + follow-up) */
  .answer{margin-top:4px}
  .answer>:first-child{margin-top:0}
  .answer h2{font-size:13px;color:var(--soft);text-transform:uppercase;letter-spacing:.06em;font-weight:700;
    margin:24px 0 6px;padding-bottom:7px;border-bottom:1px solid var(--line2)}
  .answer h3{font-size:15.5px;font-weight:700;margin:18px 0 5px}
  .answer p{margin:9px 0}
  .answer ul,.answer ol{margin:9px 0;padding-left:23px}
  .answer li{margin:4px 0}
  .answer strong{font-weight:700}
  .answer code{background:var(--code);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:13px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .answer pre{background:var(--code);border:1px solid var(--line);border-radius:10px;padding:13px 15px;overflow:auto;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.55}
  .answer pre code{background:none;border:none;padding:0}
  .answer blockquote{margin:11px 0;padding:6px 14px;border-left:3px solid var(--accent-weak);color:var(--muted)}
  .answer table{border-collapse:collapse;width:100%;margin:11px 0;font-size:13.5px}
  .answer th,.answer td{border:1px solid var(--line);padding:7px 10px;text-align:left}
  .answer th{background:var(--panel2);font-weight:600}

  /* follow-up cards: same card, muted dot + slightly smaller question */
  .card.fu .node-dot{background:var(--soft);box-shadow:0 0 0 3px var(--panel2)}
  .card.fu .q-text{font-size:14.5px;font-weight:600}
  .card.fu .answer{font-size:14px;color:var(--txt);margin-top:8px;padding-left:18px}

  footer{margin-top:42px;color:var(--soft);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="__SHEET__">&larr; __BACK__</a>

  <div class="tree">
    <div class="node">
      <div class="card root">
        <div class="qlabel">Q</div>
        <div class="q-row">
          <span class="node-dot"></span>
          <span class="q-text">__QUESTION__</span>
          <span class="lvl __LEVEL__">__LEVEL_LABEL__</span>
        </div>
        <div class="chips">__META__</div>
      </div>
    </div>
  </div>

  <article class="answer">
__ANSWER__
  </article>

  <div class="sec"><span class="sec-name">__FU_LABEL__</span></div>
  <div class="tree">
__FOLLOWUPS__
  </div>

  <footer>prepme — saved answer. Plain HTML; edit freely.</footer>
</div>
</body>
</html>
